# Read the Docs configuration. See:
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

sphinx:
  configuration: docs/conf.py
  # Match the CI docs job: warnings (broken cross-references, missing toctree
  # entries) fail the build. The optional `windspharm` dependency is mocked in
  # conf.py, so it need not be installed here.
  fail_on_warning: true

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
