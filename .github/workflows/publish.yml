name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # needed for setuptools-scm
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --extra dev
      - run: uv run pytest -W error::RuntimeWarning || test $? -eq 5
      - run: uv build
      - run: uvx twine check dist/*
      - name: Verify built version matches tag
        run: |
          built=$(ls dist/*.whl | sed -E 's|.*/puffins-([^-]+)-.*|\1|')
          tag="${GITHUB_REF_NAME#v}"
          if [ "$built" != "$tag" ]; then
            echo "Built version ($built) does not match tag ($tag)" >&2
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # trusted publishing, no API tokens needed
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/*
