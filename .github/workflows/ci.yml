name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # needed for setuptools-scm
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --extra dev
      - run: uv run ruff check --fix .
      - run: uv run ruff format .
      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "style: auto-format with ruff"
      - run: uv run mypy puffins/
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # needed for setuptools-scm
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --extra dev --python ${{ matrix.python-version }}
      - run: uv run pytest -W error::RuntimeWarning --cov=puffins --cov-report=xml || test $? -eq 5

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # needed for setuptools-scm
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --extra docs
      # -W turns warnings (broken cross-references, missing toctree entries)
      # into build failures.
      - run: uv run sphinx-build -W -b html docs docs/_build/html
